project:
  name: debris-landlab
  config_version: 1

inputs:
  asc_dir: /home/abdullah/debris_landlab/data
  forcing_csv: /home/abdullah/debris_landlab/data/forcing_daily.csv
  layers:
    dem: topographic__elevation.asc
    soil_thickness: soil__thickness.asc
    soil_density: soil__density.asc
    soil_internal_friction_angle: soil__internal_friction_angle.asc
    porosity: porosity.asc
    field_capacity: field__capacity.asc
    wilting_point: wilting__point.asc
    soil_saturated_hydraulic_conductivity: soil__saturated_hydraulic_conductivity.asc
    vegetation_plant_functional_type: vegetation__plant_functional_type.asc
    burn_severity: burn__severity.asc
    soil_maximum_total_cohesion: soil__maximum_total_cohesion.asc
    soil_mode_total_cohesion: soil__mode_total_cohesion.asc
    soil_minimum_total_cohesion: soil__minimum_total_cohesion.asc

grid:
  field_name: topographic__elevation
  nodata_value: -999999.0
  crs: EPSG:32610
  boundary_conditions:
    right_is_closed: true
    top_is_closed: false
    left_is_closed: true
    bottom_is_closed: false

outputs:
  root_dir: /home/abdullah/debris_landlab/experiments
  export_ascii: true
  export_geotiff: true
  export_zarr: true
  zarr_store_name: layers.zarr
  nodata_value: -9999.0

workflows:
  landslide_probability:
    enabled: true
    hydrology:
      latitude_deg: 47.7
      albedo: 0.2
      zveg_m: 0.5
      z_wind_m: 2.0
      vwind_mps: 3.04
      relative_humidity: 0.8
      lapse_rate_c_per_km: 4.5
      transmissivity_multiplier: 2.5
      transmissivity_floor: 0.01
      initial_saturation_mode: midpoint_fc_wp
      recharge_summary_method: max
    vegetation:
      lai_by_pft:
        0: 1.5
        1: 2.0
        2: 4.0
        3: 1.0
    landslide:
      number_of_iterations: 1000
      recharge_distribution: lognormal_spatial
      recharge_std_fraction: 0.1
    sensitivity:
      cohesion_reduction_by_burn_class:
        1: 0.0
        2: 0.15
        3: 0.35
        4: 0.60

  hillslope_diffusion:
    enabled: false
    total_t_years: 5.0
    dt_years: 1.0
    uplift_rate_m_per_yr: 0.0003
    linear_diffusivity_m2_per_yr: 0.01

  fluvial_incision:
    enabled: false
    total_t_years: 5.0
    dt_years: 1.0
    uplift_rate_m_per_yr: 0.0003
    K_sp: 0.00001
    m_sp: 0.5
    n_sp: 1.0
    threshold_sp: 0.0
    flow_director: FlowDirectorD8
